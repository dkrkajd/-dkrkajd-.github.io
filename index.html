<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>らき☆すた Blog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="blog-wrapper">
        
        <header class="blog-header">
            <div class="header-banner">
                <img src="https://via.placeholder.com/950x400/ffccd5/ff4757?text=LUCKY+STAR+BANNER" alt="대문 썸네일">
                <div class="banner-title">らき☆すた Space</div>
            </div>
        </header>

        <div class="blog-body">
            
            <aside class="left-sidebar">
                <div class="box calendar-box">
                    <h3>📅 2026年 6月</h3>
                    <div class="calendar-demo">
                        <span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span>
                        <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span class="sat">6</span><span class="sun">7</span>
                    </div>
                </div>
                <div class="box gif-box">
                    <h3>✨ Animation</h3>
                    <div class="gif-placeholder">
                        <img src="https://via.placeholder.com/150/74b9ff/ffffff?text=GIF+Here" alt="작은 움짤">
                    </div>
                </div>
            </aside>

            <main class="main-content">
                <article class="blog-post">
                    <div class="post-date">2026年 6月 27日 (土)</div>
                    <h2 class="post-title">★ 오늘 작성하는 블로그 본문 제목!</h2>
                    <div class="post-body">
                        <p>여기에 실제 본문 내용이 들어갑니다. 2000년대 초반 개인 홈피 느낌이 나도록 밝은 연두색 배경 위에 아기자기하게 배치했습니다.</p>
                        <p>이 영역에 원하는 글과 일기를 잔뜩 적어보세요!</p>
                    </div>
                </article>
            </main>

            <aside class="right-sidebar">
                <div class="box profile-box">
                    <h3>👤 PROFILE</h3>
                    <div class="profile-img-wrap">
                        <img src="https://via.placeholder.com/150/a8e6cf/ffffff?text=CHARACTER" alt="프로필">
                    </div>
                    <p class="profile-desc">Welcome to my space! ⭐️</p>
                </div>
                <div class="box category-box">
                    <h3>📂 CATEGORY</h3>
                    <ul>
                        <li><a href="#">- 일상 일기</a></li>
                        <li><a href="#">- 덕질 공간</a></li>
                        <li><a href="#">- 방명록 (Guest)</a></li>
                    </ul>
                </div>
            </aside>

        </div>
    </div>

</body>
</html>
