<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Aero Space</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="desktop-background">
        
        <div class="window-container">
            
            <div class="window-header">
                <div class="window-controls">
                    <span class="control-btn minimize"></span>
                    <span class="control-btn maximize"></span>
                    <span class="control-btn close"></span>
                </div>
                <div class="address-bar">
                    <span class="nav-arrows">◀ ▶</span>
                    <div class="url-input">https://-dkrkajd-.github.io</div>
                </div>
                <div class="window-tabs">
                    <div class="tab active">home</div>
                    <div class="tab">terms</div>
                    <div class="tab">prices</div>
                    <div class="tab">gallery</div>
                </div>
            </div>

            <div class="window-body">
                
                <aside class="sidebar">
                    <div class="profile-frame">
                        <img src="https://via.placeholder.com/150/81ecec/ffffff?text=PROFILE" alt="프로필 사진" class="profile-img">
                    </div>
                    
                    <h2 class="profile-name">Untitled</h2>
                    <p class="profile-info">info/info/info</p>
                    
                    <div class="status-box">
                        <p>🌳 status: <span class="highlight">here</span></p>
                        <p>🌿 two</p>
                        <p>💡 three</p>
                    </div>
                    
                    <div class="sns-links">
                        <a href="#" class="sns-btn insta">📸</a>
                        <a href="#" class="sns-btn twitter">🐦</a>
                        <a href="#" class="sns-btn mail">✉️</a>
                    </div>
                </aside>

                <main class="main-content">
                    <div class="post-container">
                        <h1 class="post-title">Title Here</h1>
                        
                        <div class="main-banner">
                            <img src="https://via.placeholder.com/600/74b9ff/ffffff?text=Main+Banner+Image" alt="메인 배너">
                        </div>
                        
                        <div class="post-text">
                            <p class="intro-p">welcome to my profile!!! ٩(◕ᗜ◕)و</p>
                            <p>여기에 본인이 쓰고 싶은 소개글을 자유롭게 작성하시면 됩니다. HTML 태그를 사용해 줄바꿈(&lt;br&gt;)을 하거나 글씨를 꾸밀 수 있습니다.</p>
                            <br>
                            <p><b>Before you follow:</b> 매너를 지켜주세요. 아무나 환영합니다!</p>
                        </div>
                    </div>
                </main>
                
            </div>

            <div class="window-footer">
                <button class="footer-btn blue-btn">English</button>
                <button class="footer-btn green-btn">Spanish</button>
                <span class="footer-icons">☁️ 📶 📋</span>
            </div>

        </div>
    </div>

</body>
</html>
